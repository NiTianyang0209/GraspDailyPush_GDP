name: Scrape Academic Data
on:
  schedule:
    - cron: "0 0 * * 1"
jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run academic scraper
        run: python scripts/academic/english_journals.py
      - name: Write last update timestamp
        run: echo '{"updated_at":"'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'"}' > docs/data/academic/last_update.json
      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "chore: update academic data [skip ci]"
          commit_user_name: "github-actions"
          commit_user_email: "actions@github.com"
          file_pattern: docs/data/
          skip_dirty_check: false
