name: Scrape Chinese Academic Journals
on:
  schedule:
    - cron: "0 2 * * 1,4"
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run scraper
        run: python scripts/academic/chinese_journals.py
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/data/
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update chinese academic data [skip ci]"
          git push
