<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width">
  <title>GraspDailyPush GDP · 每日信息简报</title>
  <link rel="stylesheet" href="css/style.css?v=4">
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="header-top">
        <h1 class="site-title">GraspDailyPush GDP</h1>
        <span class="site-subtitle">每日信息简报</span>
      </div>
      <div class="header-meta">
        <span class="date" id="currentDate"></span>
        <span class="update-status" id="updateStatus">加载中...</span>
        <span class="refresh-info" id="refreshInfo"></span>
        <button class="refresh-btn" id="refreshBtn" title="手动刷新数据">🔄</button>
      </div>
      <div class="header-widgets">
        <span class="widget knowledge-widget" id="knowledgeWidget">📖 加载每日知识...</span>
      </div>
    </div>
    <nav class="nav-bar">
      <div class="container">
        <button class="nav-btn active" data-page="news">📰 时事热点</button>
        <button class="nav-btn" data-page="academic">🎓 学术动态</button>
        <button class="nav-btn" data-page="commentary">🤖 AI短评</button>
      </div>
    </nav>
  </header>

  <main class="container">
    <div class="page page-news active" id="page-news">
      <section class="section" id="news-section">
        <div class="section-header">
          <h2 class="section-title">
            <span class="section-icon">📰</span>
            时事热点
          </h2>
          <span class="section-update" id="newsUpdateTime"></span>
        </div>
        <div class="news-grid">
          <div class="news-column" id="headlines-column">
            <div id="headlines-tabs" class="tab-bar"></div>
            <div id="headlines-list" class="card-list"></div>
          </div>
          <div class="news-column" id="hotlists-column">
            <h3 class="column-title">热搜榜单</h3>
            <div id="hotlists-tabs" class="tab-bar"></div>
            <div id="hotlists-content" class="card-list"></div>
          </div>
        </div>
      </section>
    </div>

    <div class="page page-academic" id="page-academic">
      <section class="section" id="academic-section">
        <div class="section-header">
          <h2 class="section-title">
            <span class="section-icon">🎓</span>
            学术动态
          </h2>
          <span class="section-update" id="academicUpdateTime"></span>
        </div>
        <div id="academic-content"></div>
      </section>
    </div>

    <div class="page page-commentary" id="page-commentary">
      <section class="section" id="commentary-section">
        <div class="section-header">
          <h2 class="section-title">
            <span class="section-icon">🤖</span>
            AI 智能点评
          </h2>
          <span class="section-update" id="commentaryTime"></span>
        </div>
        <div class="commentary-tabs tab-bar" id="commentaryTabs">
          <button class="tab-btn active" data-commentary="news">📰 时事点评</button>
          <button class="tab-btn" data-commentary="academic">🎓 学术点评</button>
        </div>
        <div class="commentary-content" id="commentaryContent">
          <div class="commentary-pane active" data-pane="news">
            <div class="commentary-body">
              <div class="commentary-section-admin">
                <div class="commentary-label label-admin">👑 管理员点评</div>
                <div class="commentary-stale" id="staleNews" style="display:none"></div>
                <div id="adminNewsBody"><div class="loading">暂无点评</div></div>
              </div>
              <div class="commentary-divider"></div>
              <div class="commentary-section-user">
                <div class="commentary-label label-user">🧑 我的点评</div>
                <div id="userNewsBody"><div class="loading">暂无</div></div>
              </div>
            </div>
            <div class="commentary-actions">
              <button class="generate-btn" data-type="news">⚡ 生成我的点评</button>
              <button class="publish-btn" id="publishNewsBtn" style="display:none">📤 发布为管理员点评</button>
              <span class="commentary-status" id="commentaryNewsStatus"></span>
            </div>
          </div>
          <div class="commentary-pane" data-pane="academic">
            <div class="commentary-body">
              <div class="commentary-section-admin">
                <div class="commentary-label label-admin">👑 管理员点评</div>
                <div class="commentary-stale" id="staleAcademic" style="display:none"></div>
                <div id="adminAcademicBody"><div class="loading">暂无点评</div></div>
              </div>
              <div class="commentary-divider"></div>
              <div class="commentary-section-user">
                <div class="commentary-label label-user">🧑 我的点评</div>
                <div id="userAcademicBody"><div class="loading">暂无</div></div>
              </div>
            </div>
            <div class="commentary-actions">
              <button class="generate-btn" data-type="academic">⚡ 生成我的点评</button>
              <button class="publish-btn" id="publishAcademicBtn" style="display:none">📤 发布为管理员点评</button>
              <span class="commentary-status" id="commentaryAcademicStatus"></span>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>GraspDailyPush GDP · 数据自动采集，仅供参考</p>
      <div class="visit-counter">
        <span id="visitTotal">总访问：--</span>
        <span class="sep">·</span>
        <span id="visitToday">今日访问：--</span>
        <span class="sep">·</span>
        <span id="tokenStatus" class="token-status" title="点击设置 GitHub Token">⏳</span>
        <span class="sep">·</span>
        <span id="deepseekStatus" class="token-status" title="点击设置 DeepSeek API Key">🧠</span>
      </div>
    </div>
  </footer>

  <img src="https://api.visitorbadge.io/api/visitors?path=https%3A%2F%2Fni-tianyang0209.github.io%2FGraspDailyPush_GDP%2F&label=Total&countColor=%232cb67a" style="display:none" alt="" id="visitorBadge">

  <script src="js/app.js?v=6"></script>
</body>
</html>
